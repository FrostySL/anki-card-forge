name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: tests (stdlib + genanki)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # genanki lets the build_deck smoke tests run instead of skipping; zstd
      # covers the modern .apkg decompression path. Everything else is stdlib.
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "genanki==0.13.1"
          sudo apt-get update && sudo apt-get install -y zstd
      - name: Run the test suite
        run: ./tools/test.sh

  shellcheck:
    name: shellcheck (shell scripts + commit guard)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # shellcheck is preinstalled on ubuntu-latest runners. -x follows the
      # sourced tools/_dockerlib.sh so the wrappers are checked with it inlined.
      - name: Lint shell scripts
        run: shellcheck -x tools/*.sh .githooks/pre-commit

  hadolint:
    name: hadolint (Dockerfiles)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # Run hadolint from its own image (no marketplace action to keep in sync).
      - name: Lint Dockerfiles
        run: |
          for df in Dockerfile Dockerfile.*; do
            echo "== $df =="
            docker run --rm -i hadolint/hadolint hadolint - < "$df"
          done
